{% extends 'base.html' %}

{% block title %}Admin - {% block admin_title %}{% endblock %}{% endblock %}

{% block content %}
<div class="app-layout has-sidebar">
    <aside class="app-sidebar" id="app-sidebar">
        <p class="sidebar-title">Admin Panel</p>
        <nav class="nav flex-column">
            <a href="{% url 'admin:dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="fas fa-tachometer-alt"></i>Dashboard
            </a>
            <a href="{% url 'admin:voice-list' %}" class="nav-link {% if 'voice' in request.resolver_match.url_name %}active{% endif %}">
                <i class="fas fa-microphone-alt"></i>Voice requests
            </a>
            <a href="{% url 'admin:users' %}" class="nav-link {% if request.resolver_match.url_name == 'users' %}active{% endif %}">
                <i class="fas fa-users"></i>Users
            </a>
            <a href="{% url 'admin:security-monitor' %}" class="nav-link {% if request.resolver_match.url_name == 'security-monitor' %}active{% endif %}">
                <i class="fas fa-shield"></i>Security monitor
            </a>
            <a href="{% url 'admin:settings' %}" class="nav-link {% if request.resolver_match.url_name == 'settings' %}active{% endif %}">
                <i class="fas fa-cog"></i>Settings
            </a>
            <a href="{% url 'admin:terminal' %}" class="nav-link {% if request.resolver_match.url_name == 'terminal' %}active{% endif %}">
                <i class="fas fa-terminal"></i>Terminal
            </a>
        </nav>
    </aside>
    <div class="app-main">
        {% block admin_content %}{% endblock %}
    </div>
</div>
{% endblock %}
