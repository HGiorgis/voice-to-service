# Voice To Service — Docker Compose
# Usage: docker compose up -d --build
# Set DATABASE_URL, GOOGLE_APPLICATION_CREDENTIALS (mount JSON), GEMINI_API_KEY in .env

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: voice-to-service:latest
    container_name: voice-to-service_web
    volumes:
      - .:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=1
      - ALLOWED_HOSTS=*
    restart: unless-stopped

volumes:
  media_volume:
  static_volume:
